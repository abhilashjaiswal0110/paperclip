name: "\U0001F41B Bug Report"
description: Report a bug or unexpected behavior in Paperclip
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out the details below
        so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Start the server with `pnpm dev`
        2. Navigate to '...'
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Paperclip Version
      description: Output of `node -e "console.log(require('./package.json').version)"` or the version you installed.
      placeholder: e.g., 1.0.0
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of Paperclip is affected?
      options:
        - Server / API
        - UI / Dashboard
        - CLI
        - Database
        - Agent Adapter
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your environment details.
      placeholder: |
        - OS: macOS 14 / Ubuntu 22.04 / Windows 11
        - Node.js: 20.x
        - pnpm: 9.15.x
        - Database: PGlite / PostgreSQL 17
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output (server logs, browser console, etc.).
      render: shell
    validations:
      required: false
